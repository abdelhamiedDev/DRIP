<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRIP — Admin</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .admin-badge {
      background: var(--accent);
      color: var(--black);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 2px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 40px;
      width: fit-content;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 12px 28px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all var(--transition);
      border-right: 1px solid var(--border);
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn:hover { background: var(--gray); color: var(--white); }
    .tab-btn.active { background: var(--accent); color: var(--black); font-weight: 700; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── ADD PRODUCT FORM ── */
    .add-product-card {
      background: var(--gray);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 640px;
    }

    .add-product-card h3 {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 2px;
      margin-bottom: 28px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ── PRODUCTS TABLE ── */
    .admin-table-wrap {
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .admin-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .admin-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .admin-table tr:hover td { background: var(--gray); }

    .admin-table img {
      width: 48px;
      height: 60px;
      object-fit: cover;
      border-radius: var(--radius);
    }

    .product-name-cell {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .category-tag {
      display: inline-block;
      background: var(--black);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 2px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .price-cell { color: var(--accent); font-weight: 600; }

    /* ── ORDERS TABLE ── */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 2px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      background: rgba(200,255,0,0.15);
      color: var(--accent);
      border: 1px solid rgba(200,255,0,0.3);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--gray);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: var(--accent);
    }

    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="navbar"></div>

  <div class="admin-layout">

    <div class="admin-header">
      <div>
        <h1 class="page-title" style="margin-bottom:8px">ADMIN</h1>
        <span class="admin-badge">Dashboard</span>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('products')">Products</button>
      <button class="tab-btn" onclick="switchTab('add')">Add Product</button>
      <button class="tab-btn" onclick="switchTab('orders')">Orders</button>
    </div>

    <!-- TAB: PRODUCTS -->
    <div class="tab-panel active" id="tab-products">
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted)">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TAB: ADD PRODUCT -->
    <div class="tab-panel" id="tab-add">
      <div class="add-product-card">
        <h3>ADD PRODUCT</h3>

        <div class="form-row">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="p-name" placeholder="Oversized Tee" />
          </div>
          <div class="form-group">
            <label>Price ($)</label>
            <input type="number" id="p-price" placeholder="35.00" step="0.01" />
          </div>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="p-category">
            <option value="tops">Tops</option>
            <option value="bottoms">Bottoms</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>

        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="p-image" placeholder="https://..." />
        </div>

        <div class="form-group">
          <label>Description</label>
          <input type="text" id="p-description" placeholder="Short product description..." />
        </div>

        <button class="btn-primary" onclick="addProduct()">Add Product</button>
        <p id="add-error"  style="color:#ff4444;font-size:13px;margin-top:12px;display:none"></p>
        <p id="add-success" style="color:var(--accent);font-size:13px;margin-top:12px;display:none">✅ Product added!</p>
      </div>
    </div>

    <!-- TAB: ORDERS -->
    <div class="tab-panel" id="tab-orders">
      <div class="stats-row" id="stats-row">
        <div class="stat-card"><p class="stat-label">Total Orders</p><p class="stat-value" id="stat-orders">—</p></div>
        <div class="stat-card"><p class="stat-label">Total Revenue</p><p class="stat-value" id="stat-revenue">—</p></div>
        <div class="stat-card"><p class="stat-label">Products Listed</p><p class="stat-value" id="stat-products">—</p></div>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Email</th>
              <th>Total</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <div id="toast"></div>
  <footer><p>© 2026 DRIP — Admin Panel</p></footer>

  <script src="app.js"></script>
  <script>
    // ── TAB SWITCHING ──
    function switchTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${name}`).classList.add('active');
      event.target.classList.add('active');

      // Load data when switching
      if (name === 'products') loadProducts();
      if (name === 'orders')   loadOrders();
    }

    // ── LOAD PRODUCTS ──
    async function loadProducts() {
      const tbody = document.getElementById('products-tbody');
      try {
        const res      = await fetch(`${API}/products`);
        const products = await res.json();

        document.getElementById('stat-products').textContent = products.length;

        if (products.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted)">No products yet. Add one!</td></tr>`;
          return;
        }

        tbody.innerHTML = products.map(p => `
          <tr>
            <td><img src="${p.image_url}" alt="${p.name}" /></td>
            <td class="product-name-cell">${p.name}</td>
            <td><span class="category-tag">${p.category}</span></td>
            <td class="price-cell">$${parseFloat(p.price).toFixed(2)}</td>
            <td>
              <button class="btn-danger" onclick="deleteProduct(${p.id}, this)">Delete</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:#ff4444">Backend offline. Run: node server.js</td></tr>`;
      }
    }

    // ── DELETE PRODUCT ──
    async function deleteProduct(id, btn) {
      if (!confirm('Delete this product?')) return;
      btn.textContent = '...';
      btn.disabled = true;
      try {
        await fetch(`${API}/products/${id}`, { method: 'DELETE' });
        showToast('Product deleted');
        loadProducts();
      } catch (err) {
        showToast('Delete failed');
        btn.textContent = 'Delete';
        btn.disabled = false;
      }
    }

    // ── ADD PRODUCT ──
    async function addProduct() {
      const name        = document.getElementById('p-name').value.trim();
      const price       = document.getElementById('p-price').value;
      const category    = document.getElementById('p-category').value;
      const image_url   = document.getElementById('p-image').value.trim();
      const description = document.getElementById('p-description').value.trim();
      const errorEl     = document.getElementById('add-error');
      const successEl   = document.getElementById('add-success');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!name || !price || !image_url) {
        errorEl.textContent = 'Name, price, and image URL are required.';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${API}/products`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, price: parseFloat(price), category, image_url, description })
        });
        if (!res.ok) throw new Error();
        successEl.style.display = 'block';
        // Clear the form
        ['p-name','p-price','p-image','p-description'].forEach(id => document.getElementById(id).value = '');
      } catch (err) {
        errorEl.textContent = 'Failed to add product. Is the backend running?';
        errorEl.style.display = 'block';
      }
    }

    // ── LOAD ORDERS ──
    async function loadOrders() {
      const tbody = document.getElementById('orders-tbody');
      try {
        const res    = await fetch(`${API}/orders`);
        const orders = await res.json();

        document.getElementById('stat-orders').textContent  = orders.length;
        const revenue = orders.reduce((sum, o) => sum + parseFloat(o.total), 0);
        document.getElementById('stat-revenue').textContent = `$${revenue.toFixed(0)}`;

        if (orders.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">No orders yet.</td></tr>`;
          return;
        }

        tbody.innerHTML = orders.map(o => `
          <tr>
            <td style="font-family:monospace;color:var(--muted)">#${o.id}</td>
            <td style="font-weight:600">${o.customer_name}</td>
            <td style="color:var(--muted)">${o.customer_email}</td>
            <td class="price-cell">$${parseFloat(o.total).toFixed(2)}</td>
            <td style="color:var(--muted)">${new Date(o.created_at).toLocaleDateString()}</td>
            <td><span class="status-badge">Confirmed</span></td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:#ff4444">Backend offline.</td></tr>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadProducts();
      // Pre-load stats in the background
      loadOrders();
    });
  </script>

</body>
</html>
