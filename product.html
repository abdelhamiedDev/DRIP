<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRIP — Product</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .product-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    .product-image-wrap {
      position: sticky;
      top: 80px;
    }

    .product-image-wrap img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .product-details {
      padding-top: 20px;
    }

    .product-category {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .product-name {
      font-family: var(--font-display);
      font-size: 4rem;
      line-height: 1;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .product-price {
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 32px;
    }

    .product-description {
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .size-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .size-options {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .size-btn {
      width: 48px;
      height: 48px;
      background: var(--gray);
      border: 1px solid var(--border);
      color: var(--white);
      font-size: 13px;
      border-radius: var(--radius);
      transition: all var(--transition);
    }
    .size-btn:hover, .size-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--black);
      font-weight: 700;
    }

    .action-row {
      display: flex;
      gap: 12px;
    }

    .action-row .btn-primary {
      flex: 1;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 32px 40px 0;
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--white); }

    @media (max-width: 768px) {
      .product-page { grid-template-columns: 1fr; gap: 32px; }
      .product-image-wrap { position: static; }
      .product-name { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

  <div id="navbar"></div>
  <a href="shop.html" class="back-link">← Back to Shop</a>

  <div id="product-container">
    <div class="loading">Loading product</div>
  </div>

  <div id="toast"></div>
  <footer><p>© 2026 DRIP — All Rights Reserved</p></footer>

  <script src="app.js"></script>
  <script>
    let currentProduct = null;
    let selectedSize = null;

    // Read the ?id=123 from the URL
    // URLSearchParams is a built-in browser tool that reads URL query strings
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    async function loadProduct() {
      const container = document.getElementById('product-container');

      if (!productId) {
        container.innerHTML = `<div class="empty-state"><h3>No Product ID</h3><p><a href="shop.html">Go back to shop</a></p></div>`;
        return;
      }

      try {
        const res = await fetch(`${API}/products/${productId}`);
        if (!res.ok) throw new Error('Not found');
        currentProduct = await res.json();

        document.title = `DRIP — ${currentProduct.name}`;

        container.innerHTML = `
          <div class="product-page">
            <div class="product-image-wrap">
              <img src="${currentProduct.image_url}" alt="${currentProduct.name}" />
            </div>
            <div class="product-details">
              <p class="product-category">${currentProduct.category}</p>
              <h1 class="product-name">${currentProduct.name}</h1>
              <p class="product-price">$${parseFloat(currentProduct.price).toFixed(2)}</p>
              <p class="product-description">${currentProduct.description || 'No description available.'}</p>

              <p class="size-label">Select Size</p>
              <div class="size-options" id="size-options">
                ${['XS','S','M','L','XL','XXL'].map(s => `
                  <button class="size-btn" onclick="selectSize('${s}', this)">${s}</button>
                `).join('')}
              </div>

              <div class="action-row">
                <button class="btn-primary" onclick="handleAddToCart()">Add to Cart</button>
                <a href="cart.html" class="btn-outline" style="display:inline-flex;align-items:center;justify-content:center">View Cart</a>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><h3>Product Not Found</h3><p><a href="shop.html">Go back to shop</a></p></div>`;
      }
    }

    function selectSize(size, btn) {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedSize = size;
    }

    function handleAddToCart() {
      if (!selectedSize) {
        showToast('Please select a size first!');
        return;
      }
      addToCart({
        id: currentProduct.id,
        name: currentProduct.name,
        price: currentProduct.price,
        image_url: currentProduct.image_url,
        size: selectedSize
      });
    }

    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>

</body>
</html>
