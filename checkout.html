<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRIP — Checkout</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .checkout-layout {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 40px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 60px;
      align-items: start;
    }

    .checkout-form-section h2 {
      font-family: var(--font-display);
      font-size: 3rem;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .form-section-title {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ── ORDER REVIEW ── */
    .order-review {
      background: var(--gray);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      position: sticky;
      top: 80px;
    }

    .order-review h3 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .review-item {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .review-item img {
      width: 56px;
      height: 70px;
      object-fit: cover;
      border-radius: var(--radius);
    }

    .review-item-name {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .review-item-qty {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .review-item-price {
      margin-left: auto;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
    }

    .review-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      font-size: 16px;
      font-weight: 700;
    }

    .review-total span:last-child { color: var(--accent); }

    /* ── SUCCESS STATE ── */
    .success-screen {
      text-align: center;
      padding: 80px 40px;
      max-width: 560px;
      margin: 0 auto;
    }

    .success-icon {
      font-size: 4rem;
      margin-bottom: 24px;
    }

    .success-screen h2 {
      font-family: var(--font-display);
      font-size: 3.5rem;
      letter-spacing: 2px;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .success-screen p {
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .order-id-tag {
      display: inline-block;
      background: var(--gray);
      border: 1px solid var(--border);
      padding: 10px 24px;
      border-radius: var(--radius);
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    @media (max-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .order-review { position: static; }
    }
  </style>
</head>
<body>

  <div id="navbar"></div>

  <div id="main-content">
    <div class="checkout-layout">

      <!-- LEFT: Form -->
      <div class="checkout-form-section">
        <h2>CHECKOUT</h2>

        <p class="form-section-title">Contact Info</p>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="first-name" placeholder="Ahmed" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="last-name" placeholder="Hassan" required />
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@email.com" required />
        </div>

        <p class="form-section-title" style="margin-top:32px">Shipping Address</p>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="address" placeholder="123 Street Name" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>City</label>
            <input type="text" id="city" placeholder="Cairo" required />
          </div>
          <div class="form-group">
            <label>Country</label>
            <input type="text" id="country" placeholder="Egypt" required />
          </div>
        </div>

        <button class="btn-primary" id="place-order-btn" onclick="placeOrder()">
          Place Order
        </button>
        <p id="form-error" style="color:#ff4444;font-size:13px;margin-top:12px;display:none"></p>
      </div>

      <!-- RIGHT: Order Review -->
      <div class="order-review">
        <h3>YOUR ORDER</h3>
        <div id="order-items-list"></div>
        <div class="review-total">
          <span>Total</span>
          <span id="review-total">$0.00</span>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>
  <footer><p>© 2026 DRIP — All Rights Reserved</p></footer>

  <script src="app.js"></script>
  <script>
    // Render the order review on the right side
    function renderOrderReview() {
      const cart = getCart();
      const listEl = document.getElementById('order-items-list');

      if (cart.length === 0) {
        // If someone lands here with an empty cart, redirect them
        window.location.href = 'cart.html';
        return;
      }

      listEl.innerHTML = cart.map(item => `
        <div class="review-item">
          <img src="${item.image_url}" alt="${item.name}" />
          <div>
            <p class="review-item-name">${item.name}</p>
            <p class="review-item-qty">Qty: ${item.quantity} ${item.size ? `· ${item.size}` : ''}</p>
          </div>
          <span class="review-item-price">$${(item.price * item.quantity).toFixed(2)}</span>
        </div>
      `).join('');

      document.getElementById('review-total').textContent = `$${getCartTotal().toFixed(2)}`;
    }

    // Place the order — this is where frontend talks to backend talks to database
    async function placeOrder() {
      const firstName = document.getElementById('first-name').value.trim();
      const lastName  = document.getElementById('last-name').value.trim();
      const email     = document.getElementById('email').value.trim();
      const errorEl   = document.getElementById('form-error');
      const btn       = document.getElementById('place-order-btn');

      // Basic validation
      if (!firstName || !lastName || !email) {
        errorEl.textContent = 'Please fill in all required fields.';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      btn.textContent = 'Placing Order...';
      btn.disabled = true;

      const cart = getCart();

      // Build the order payload to send to backend
      const orderPayload = {
        customer_name:  `${firstName} ${lastName}`,
        customer_email: email,
        total: getCartTotal(),
        items: cart.map(item => ({
          product_id: item.id,
          quantity:   item.quantity,
          price:      item.price
        }))
      };

      try {
        // POST to your backend → which saves to MySQL
        const res = await fetch(`${API}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderPayload)
        });

        if (!res.ok) throw new Error('Server error');
        const data = await res.json();

        // Clear the cart after successful order
        clearCart();

        // Show success screen
        document.getElementById('main-content').innerHTML = `
          <div class="success-screen">
            <div class="success-icon">✅</div>
            <h2>ORDER PLACED!</h2>
            <p>Thanks, ${firstName}! Your order has been saved to our database.
            You'll receive a confirmation at <strong>${email}</strong>.</p>
            <div class="order-id-tag">Order #${data.orderId}</div>
            <br/>
            <a href="shop.html" class="btn-primary" style="display:inline-block;width:auto;padding:14px 40px">
              Continue Shopping
            </a>
          </div>
        `;

      } catch (err) {
        btn.textContent = 'Place Order';
        btn.disabled = false;
        errorEl.textContent = 'Something went wrong. Make sure the backend server is running.';
        errorEl.style.display = 'block';
      }
    }

    document.addEventListener('DOMContentLoaded', renderOrderReview);
  </script>

</body>
</html>
